name: Python Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Inspect hard gate definition
        run: python scripts/release_gate.py --report --json --check-clean

      - name: Run unified hard release gate
        run: python scripts/release_gate.py --run --check-clean --allow-dirty
