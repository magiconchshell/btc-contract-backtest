# Binance Futures Testnet — Default Configuration
# =================================================
# This config is designed for long-term autonomous testnet trading.
# Copy this file and adjust parameters for your strategy.

contract:
  symbol: "BTC/USDT"
  market_type: "perpetual"
  quote_currency: "USDT"
  exchange_id: "binance"
  exchange_profile: "binance_futures_testnet"
  leverage: 5
  tick_size: 0.1
  lot_size: 0.001
  min_notional: 5.0
  margin_mode: "isolated"
  position_mode: "one_way"

account:
  initial_capital: 1000.0
  taker_fee_rate: 0.0004
  maker_fee_rate: 0.0002
  funding_rate_annual: 0.10
  fee_tier: "default"

risk:
  max_position_notional_pct: 0.50      # Max 50% of capital per position
  stop_loss_pct: 0.03                   # 3% stop loss
  take_profit_pct: 0.06                 # 6% take profit
  trailing_stop_pct: 0.02              # 2% trailing stop
  max_holding_bars: 72                  # Max 72 bars (3 days at 1h)
  max_daily_loss_pct: 5.0              # 5% daily loss limit
  kill_on_stale_data: true
  stale_data_threshold_seconds: 120
  maintenance_margin_ratio: 0.005

execution:
  use_orderbook_simulation: true
  simulated_spread_bps: 1.5
  simulated_slippage_bps: 2.0
  max_fill_ratio_per_bar: 1.0
  allow_partial_fills: true
  default_order_type: "market"
  enable_reduce_only: true
  funding_interval_hours: 8
  use_realistic_funding: true

live_risk:
  enable_kill_switch: true
  max_consecutive_failures: 5
  max_daily_loss_pct: 5.0
  max_open_positions: 1
  heartbeat_timeout_seconds: 300
  reconcile_on_startup: true
  cancel_open_orders_on_shutdown: true

# Logging configuration (used by live trading)
logging:
  level: "INFO"
  log_file: "var/logs/trading.log"
  json_format: true
